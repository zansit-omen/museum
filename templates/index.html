<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Museum</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">

<style>

/* BODY + BACKGROUND */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: url("{{ url_for('static', filename='background.png') }}") center/cover no-repeat fixed;
    color: #3a2c2c;
}

/* SOFT OVERLAY (so text is readable but background still visible) */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(255, 245, 240, 0.6);
    z-index: -1;
}

/* HERO */
.hero {
    height: 90vh;
    background: url("{{ url_for('static', filename=photos[0]['url']) }}") center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.4);
}

.hero-text {
    position: relative;
    color: white;
    text-align: center;
    font-family: 'Playfair Display', serif;
}

.hero-text h1 {
    font-size: 2.8rem;
}

/* HEADER */
header {
    text-align: center;
    padding: 60px 20px;
}

header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
}

/* GALLERY */
.gallery {
    max-width: 1100px;
    margin: auto;
    padding: 80px 20px;
    display: flex;
    flex-direction: column;
    gap: 120px;
}

/* EXHIBIT */
.exhibit {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 60px;
}

.reverse {
    flex-direction: row-reverse;
}

/* PHOTO FRAME */
.photo-frame {
    width: 45%;
    padding: 14px;

    background: linear-gradient(135deg, #5a3e1b, #3b2a14, #6b4a1f);
    border: 8px solid #2d1f0f;

    box-shadow:
        inset 0 0 0 6px #e8d8a8,
        inset 0 0 0 10px #b89b5e,
        0 15px 35px rgba(0,0,0,0.8);

    cursor: pointer;
    transition: 0.3s;
}

.photo-frame:hover {
    transform: scale(1.05);
}

.photo-frame img {
    width: 100%;
    display: block;
}

/* DESCRIPTION */
.frame {
    width: 40%;
    background: #ffffffd9;
    padding: 40px;
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    line-height: 1.8;

    opacity: 0;
    transform: translateY(30px);
    transition: all 0.5s ease;
}

.frame.show {
    opacity: 1;
    transform: translateY(0);
}

/* FOOTER */
footer {
    text-align: center;
    padding: 50px;
    color: #777;
}

/* MOBILE */
@media (max-width: 768px) {
    .exhibit {
        flex-direction: column;
    }

    .photo-frame, .frame {
        width: 100%;
    }
}

</style>
</head>

<body>

<section class="hero">
    <div class="hero-text">
        <h1>"Quiero hablar de ti siempre como el amor que eres,<br>nunca como el amor que fuiste."</h1>
    </div>
</section>

<header>
    <h1>Nuestro museo</h1>
    <p>Nuestro primer año juntos</p>
</header>

<div class="gallery">
{% for photo in photos %}
    <div class="exhibit {% if loop.index % 2 == 0 %}reverse{% endif %}">
        
        <div class="photo-frame" onclick="toggleDescription(this)">
            <img src="{{ url_for('static', filename=photo['url']) }}">
        </div>

        <div class="frame">
            {{ photo['description'] }}
        </div>

    </div>
{% endfor %}
</div>

<footer>
    <p>Demasiados momentos juntos ❤️</p>
</footer>

<script>
function toggleDescription(photoElement) {
    const exhibit = photoElement.parentElement;
    const frame = exhibit.querySelector(".frame");
    frame.classList.toggle("show");
}
</script>

</body>
</html>
